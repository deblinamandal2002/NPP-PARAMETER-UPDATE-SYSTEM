<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NPCIL Parameter Update System</title>
    <!-- React & Babel CDNs -->
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Firebase Compat CDNs -->
    <script src="https://www.gstatic.com/firebasejs/11.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/11.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@300;400;600&display=swap');
        
        body {
            margin: 0;
            padding: 0;
            background-color: #020804;
            color: white;
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
        }

        .font-nuclear {
            font-family: 'Orbitron', sans-serif;
        }

        .glass {
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(16, 185, 129, 0.2);
        }

        .nuclear-glow {
            box-shadow: 0 0 15px rgba(16, 185, 129, 0.2);
        }

        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: #020804;
        }
        ::-webkit-scrollbar-thumb {
            background: #10b981;
            border-radius: 10px;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- FIREBASE INITIALIZATION ---
        const firebaseConfig = JSON.parse(__firebase_config);
        const app = firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'npcil-control-sys';

        // --- SVG ICONS (Internal to avoid CDN dependency issues) ---
        const Icons = {
            Zap: ({ className }) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M4 14.71 14.15 3l-2.06 8.57L20 9.29 9.85 21l2.06-8.57L4 14.71z"/></svg>,
            Activity: ({ className }) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg>,
            Thermometer: ({ className }) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M14 4v10.54a4 4 0 1 1-4 0V4a2 2 0 0 1 4 0Z"/></svg>,
            ShieldAlert: ({ className }) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M20 13c0 5-3.5 7.5-7.66 8.95a1 1 0 0 1-.67-.01C7.5 20.5 4 18 4 13V6a1 1 0 0 1 1-1c2 0 4.5-1.2 6.24-2.72a1.17 1.17 0 0 1 1.52 0C14.5 3.8 17 5 19 5a1 1 0 0 1 1 1z"/><path d="M12 8v4"/><path d="M12 16h.01"/></svg>,
            LogOut: ({ className }) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" x2="9" y1="12" y2="12"/></svg>,
            FileSpreadsheet: ({ className }) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect width="18" height="18" x="3" y="3" rx="2" ry="2"/><line x1="3" x2="21" y1="9" y2="9"/><line x1="3" x2="21" y1="15" y2="15"/><line x1="9" x2="9" y1="3" y2="21"/><line x1="15" x2="15" y1="3" y2="21"/></svg>,
            Lock: ({ className }) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect width="18" height="11" x="3" y="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>,
            Mail: ({ className }) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect width="20" height="16" x="2" y="4" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></svg>,
            User: ({ className }) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>,
            AlertTriangle: ({ className }) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3Z"/><path d="M12 9v4"/><path d="M12 17h.01"/></svg>,
            LayoutDashboard: ({ className }) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect width="7" height="9" x="3" y="3" rx="1"/><rect width="7" height="5" x="14" y="3" rx="1"/><rect width="7" height="9" x="14" y="12" rx="1"/><rect width="7" height="5" x="3" y="16" rx="1"/></svg>
        };

        const App = () => {
            const [user, setUser] = useState(null);
            const [view, setView] = useState('login'); 
            const [loading, setLoading] = useState(true);
            const [formData, setFormData] = useState({ name: '', email: '', password: '' });
            const [sessionData, setSessionData] = useState(null); 
            const [visitors, setVisitors] = useState([]);
            const [plantStats, setPlantStats] = useState({
                coreTemp: 285,
                pressure: 15.2,
                output: 940,
                radiation: 0.12,
                status: 'OPTIMAL'
            });

            useEffect(() => {
                const initAuth = async () => {
                    try {
                        if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                            await auth.signInWithCustomToken(__initial_auth_token);
                        }
                    } catch (err) {
                        console.error("Auth Error:", err);
                    } finally {
                        setLoading(false);
                    }
                };
                initAuth();
                const unsubscribe = auth.onAuthStateChanged((u) => {
                    setUser(u);
                    if (u) setView('dashboard');
                });
                return () => unsubscribe();
            }, []);

            useEffect(() => {
                if (!user) return;
                const q = db.collection('artifacts').doc(appId).collection('public').doc('data').collection('visitor_logs');
                const unsubscribe = q.onSnapshot((snapshot) => {
                    const logs = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                    setVisitors(logs);
                }, (err) => console.error("Firestore error:", err));
                return () => unsubscribe();
            }, [user]);

            useEffect(() => {
                if (view !== 'dashboard') return;
                const interval = setInterval(() => {
                    setPlantStats(prev => ({
                        ...prev,
                        coreTemp: +(prev.coreTemp + (Math.random() - 0.5) * 2).toFixed(1),
                        pressure: +(prev.pressure + (Math.random() - 0.5) * 0.1).toFixed(2),
                        output: +(prev.output + (Math.random() - 0.5) * 5).toFixed(0),
                        radiation: +(prev.radiation + (Math.random() - 0.5) * 0.01).toFixed(3)
                    }));
                }, 3000);
                return () => clearInterval(interval);
            }, [view]);

            const handleLogin = async (e) => {
                e.preventDefault();
                setLoading(true);
                try {
                    await auth.signInAnonymously();
                    setSessionData(formData); 
                    await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('visitor_logs').add({
                        name: formData.name,
                        email: formData.email,
                        accessTime: firebase.firestore.FieldValue.serverTimestamp(),
                        role: 'Standard Operator'
                    });
                } catch (err) {
                    console.error(err);
                } finally {
                    setLoading(false);
                }
            };

            const handleGuestLogin = async () => {
                setLoading(true);
                try {
                    const guestInfo = {
                        name: 'Guest User',
                        email: 'guest@npcil.gov.in',
                        password: '000'
                    };
                    await auth.signInAnonymously();
                    setSessionData(guestInfo);
                    await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('visitor_logs').add({
                        name: guestInfo.name,
                        email: guestInfo.email,
                        accessTime: firebase.firestore.FieldValue.serverTimestamp(),
                        role: 'Temporary Guest'
                    });
                } catch (err) {
                    console.error(err);
                } finally {
                    setLoading(false);
                }
            };

            const logout = () => {
                auth.signOut().then(() => {
                    setSessionData(null);
                    setView('login');
                });
            };

            if (loading) return (
                <div className="h-screen w-full bg-black flex items-center justify-center">
                    <div className="text-emerald-500 font-nuclear animate-pulse tracking-[0.5em] text-xs">INITIALIZING CORE...</div>
                </div>
            );

            return (
                <div className="min-h-screen w-full relative flex items-center justify-center p-4">
                    <div 
                        className="fixed inset-0 z-0 bg-cover bg-center"
                        style={{ backgroundImage: `url('https://images.unsplash.com/photo-1518770660439-4636190af475?auto=format&fit=crop&q=80')` }}
                    >
                        <div className="absolute inset-0 bg-emerald-950/80 backdrop-blur-[2px]"></div>
                        <div className="absolute inset-0 bg-gradient-to-b from-transparent via-emerald-900/40 to-[#020804]"></div>
                    </div>

                    <div className="absolute inset-0 z-0 opacity-10 pointer-events-none" style={{ backgroundImage: `radial-gradient(#10b981 0.5px, transparent 0.5px)`, backgroundSize: '24px 24px' }}></div>

                    <div className="relative z-10 w-full flex justify-center">
                        {view === 'login' && (
                            <div className="relative w-full max-w-md p-8 rounded-2xl glass nuclear-glow">
                                <div className="flex items-center justify-center gap-4 mb-8">
                                    <div className="w-12 h-12 bg-emerald-500 rounded-lg flex items-center justify-center shadow-[0_0_15px_rgba(16,185,129,0.5)]">
                                        <Icons.Zap className="text-black" />
                                    </div>
                                    <h1 className="text-2xl font-bold tracking-tighter text-emerald-400 uppercase font-nuclear">NPCIL <span className="text-white opacity-50 text-sm block font-sans font-normal">Parameter Control</span></h1>
                                </div>

                                <form onSubmit={handleLogin} className="space-y-6">
                                    <div className="space-y-4">
                                        <div className="relative group">
                                            <Icons.User className="absolute left-3 top-3.5 text-emerald-500/50 group-focus-within:text-emerald-400 transition-colors" />
                                            <input 
                                                type="text" placeholder="Operator Name" required
                                                className="w-full bg-black/40 border border-emerald-900/50 rounded-lg py-3 pl-10 pr-4 text-emerald-100 placeholder:text-emerald-900 focus:outline-none focus:border-emerald-500"
                                                onChange={(e) => setFormData({...formData, name: e.target.value})}
                                            />
                                        </div>
                                        <div className="relative group">
                                            <Icons.Mail className="absolute left-3 top-3.5 text-emerald-500/50 group-focus-within:text-emerald-400 transition-colors" />
                                            <input 
                                                type="text" placeholder="Station Email" required
                                                className="w-full bg-black/40 border border-emerald-900/50 rounded-lg py-3 pl-10 pr-4 text-emerald-100 placeholder:text-emerald-900 focus:outline-none focus:border-emerald-500"
                                                onChange={(e) => setFormData({...formData, email: e.target.value})}
                                            />
                                        </div>
                                        <div className="relative group">
                                            <Icons.Lock className="absolute left-3 top-3.5 text-emerald-500/50 group-focus-within:text-emerald-400 transition-colors" />
                                            <input 
                                                type="password" placeholder="Security PIN" required
                                                className="w-full bg-black/40 border border-emerald-900/50 rounded-lg py-3 pl-10 pr-4 text-emerald-100 placeholder:text-emerald-900 focus:outline-none focus:border-emerald-500"
                                                onChange={(e) => setFormData({...formData, password: e.target.value})}
                                            />
                                        </div>
                                    </div>

                                    <div className="flex flex-col gap-3 pt-2">
                                        <button type="submit" className="w-full bg-emerald-600 hover:bg-emerald-500 text-black font-bold py-3 rounded-lg shadow-lg active:scale-95 transition-all uppercase tracking-widest text-xs font-nuclear">
                                            Authenticate
                                        </button>
                                        <button type="button" onClick={handleGuestLogin} className="w-full bg-transparent border border-emerald-500/50 text-emerald-400 hover:bg-emerald-500/10 font-bold py-3 rounded-lg active:scale-95 transition-all uppercase tracking-widest text-xs font-nuclear">
                                            Authenticate As Guest
                                        </button>
                                    </div>
                                    <p className="text-center text-[10px] text-emerald-900 uppercase tracking-widest">NPCIL Secure Portal • v4.0.1</p>
                                </form>
                            </div>
                        )}

                        {view === 'dashboard' && (
                            <div className="w-full max-w-6xl space-y-6">
                                <header className="flex flex-col md:flex-row justify-between items-start md:items-center gap-4 glass p-6 rounded-2xl">
                                    <div className="flex items-center gap-4">
                                        <div className="p-3 bg-emerald-500/10 rounded-xl border border-emerald-500/20">
                                            <Icons.Activity className="text-emerald-400 animate-pulse" />
                                        </div>
                                        <div>
                                            <h2 className="text-xl font-bold text-white uppercase tracking-tight font-nuclear">Reactor Core Unit 01</h2>
                                            <p className="text-emerald-500/60 text-xs font-mono uppercase">Operator: {sessionData?.name} • STATUS: {plantStats.status}</p>
                                        </div>
                                    </div>
                                    <div className="flex gap-2">
                                        {sessionData?.name === "Devi" && sessionData?.email === "deviz" && sessionData?.password === "91" ? (
                                            <button onClick={() => setView('guestLog')} className="px-4 py-2 bg-blue-500/20 border border-blue-500/50 text-blue-400 rounded-lg text-xs font-bold hover:bg-blue-500/30 transition-all flex items-center gap-2">
                                                <Icons.FileSpreadsheet /> VISITOR LOG
                                            </button>
                                        ) : (
                                            <div className="px-4 py-2 bg-white/5 border border-white/10 text-white/30 rounded-lg text-xs font-bold cursor-not-allowed flex items-center gap-2">
                                                <Icons.Lock className="w-3.5 h-3.5" /> LOGS RESTRICTED
                                            </div>
                                        )}
                                        <button onClick={logout} className="px-4 py-2 bg-red-500/20 border border-red-500/50 text-red-400 rounded-lg text-xs font-bold hover:bg-red-500/30 transition-all flex items-center gap-2">
                                            <Icons.LogOut /> TERMINATE
                                        </button>
                                    </div>
                                </header>

                                <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
                                    <StatCard label="Core Temperature" val={plantStats.coreTemp} unit="°C" icon={<Icons.Thermometer />} color="text-orange-400" />
                                    <StatCard label="Containment Pressure" val={plantStats.pressure} unit="MPa" icon={<Icons.Zap />} color="text-blue-400" />
                                    <StatCard label="Energy Output" val={plantStats.output} unit="MWe" icon={<Icons.Activity />} color="text-emerald-400" />
                                    <StatCard label="Radiation Level" val={plantStats.radiation} unit="mSv/h" icon={<Icons.ShieldAlert />} color="text-yellow-400" />
                                </div>

                                <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
                                    <div className="lg:col-span-2 glass p-6 rounded-2xl">
                                        <h3 className="text-emerald-400 font-bold mb-4 flex items-center gap-2 uppercase tracking-tighter font-nuclear">
                                            <Icons.LayoutDashboard /> Real-Time Spectrometer
                                        </h3>
                                        <div className="h-64 flex items-end gap-1 overflow-hidden group">
                                            {Array.from({ length: 40 }).map((_, i) => (
                                                <div key={i} className="flex-1 bg-emerald-500/20 rounded-t border-t border-emerald-500/50 transition-all duration-500" style={{ height: `${20 + Math.random() * 80}%` }}></div>
                                            ))}
                                        </div>
                                    </div>
                                    <div className="glass p-6 rounded-2xl">
                                        <h3 className="text-red-400 font-bold mb-4 flex items-center gap-2 uppercase tracking-tighter font-nuclear">
                                            <Icons.AlertTriangle /> System Alerts
                                        </h3>
                                        <div className="space-y-4">
                                            <AlertItem type="warning" msg="Coolant pump 03 efficiency down 4%" time="14:22" />
                                            <AlertItem type="info" msg="External grid synchronization complete" time="13:45" />
                                            <AlertItem type="critical" msg="Manual override sensor recalibrating" time="12:01" />
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}

                        {view === 'guestLog' && (
                            <div className="w-full max-w-4xl bg-black/60 backdrop-blur-2xl p-8 rounded-2xl border border-blue-500/30">
                                <div className="flex justify-between items-center mb-6">
                                    <h2 className="text-2xl font-bold text-blue-400 flex items-center gap-2 uppercase tracking-tighter font-nuclear">
                                        <Icons.FileSpreadsheet /> Access Records (Live Ledger)
                                    </h2>
                                    <button onClick={() => setView('dashboard')} className="text-xs text-white/50 hover:text-white underline uppercase">Return to Console</button>
                                </div>
                                <div className="overflow-x-auto">
                                    <table className="w-full text-left text-xs font-mono uppercase">
                                        <thead className="border-b border-blue-500/30 text-blue-300">
                                            <tr>
                                                <th className="pb-4">Timestamp</th>
                                                <th className="pb-4">Operator</th>
                                                <th className="pb-4">Channel</th>
                                                <th className="pb-4">Role</th>
                                            </tr>
                                        </thead>
                                        <tbody className="text-white/80">
                                            {visitors.map((log) => (
                                                <tr key={log.id} className="border-b border-white/5 hover:bg-blue-500/5 transition-colors">
                                                    <td className="py-4 opacity-50">{log.accessTime?.toDate().toLocaleString() || 'Syncing...'}</td>
                                                    <td className="py-4 font-bold">{log.name}</td>
                                                    <td className="py-4">{log.email}</td>
                                                    <td className={`py-4 ${log.role === 'Temporary Guest' ? 'text-yellow-500' : 'text-emerald-400'}`}>{log.role}</td>
                                                </tr>
                                            ))}
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        const StatCard = ({ label, val, unit, icon, color }) => (
            <div className="glass p-5 rounded-2xl hover:border-emerald-500/50 transition-all group">
                <div className="flex justify-between items-start mb-4">
                    <div className={`p-2 rounded-lg bg-black/40 border border-white/5 ${color}`}>{icon}</div>
                    <div className="text-[10px] font-mono text-emerald-500/40 uppercase tracking-widest">Live Feed</div>
                </div>
                <div className="space-y-1">
                    <div className={`text-3xl font-bold ${color}`}>{val} <span className="text-sm font-normal opacity-70">{unit}</span></div>
                    <div className="text-xs text-white/40 uppercase font-medium">{label}</div>
                </div>
            </div>
        );

        const AlertItem = ({ type, msg, time }) => {
            const colors = {
                warning: 'border-yellow-500/30 bg-yellow-500/5 text-yellow-200',
                critical: 'border-red-500/30 bg-red-500/5 text-red-200',
                info: 'border-blue-500/30 bg-blue-500/5 text-blue-200'
            };
            return (
                <div className={`p-3 rounded-lg border flex justify-between items-center text-[11px] ${colors[type]}`}>
                    <span className="font-mono">{msg}</span>
                    <span className="opacity-40 italic">{time}</span>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
