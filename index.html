<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NPCIL Parameter Update System</title>
    <!-- React & Babel CDNs -->
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Firebase Compat CDNs -->
    <script src="https://www.gstatic.com/firebasejs/11.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/11.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@300;400;600&display=swap');
        
        body {
            margin: 0;
            padding: 0;
            background-color: #020804;
            color: white;
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
        }

        .font-nuclear {
            font-family: 'Orbitron', sans-serif;
        }

        .glass {
            background: rgba(0, 0, 0, 0.45);
            backdrop-filter: blur(14px);
            border: 1px solid rgba(16, 185, 129, 0.25);
        }

        .nuclear-glow {
            box-shadow: 0 0 20px rgba(16, 185, 129, 0.15);
        }

        .green-overlay {
            background: rgba(6, 78, 59, 0.75); /* Light greenish transparent */
        }

        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: #020804;
        }
        ::-webkit-scrollbar-thumb {
            background: #10b981;
            border-radius: 10px;
        }
        
        @keyframes pulse-slow {
            0%, 100% { opacity: 0.8; }
            50% { opacity: 0.4; }
        }
        .animate-pulse-slow {
            animation: pulse-slow 3s infinite;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- FIREBASE INITIALIZATION ---
        const firebaseConfig = JSON.parse(__firebase_config);
        const app = firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'npcil-control-sys';

        // --- SVG ICONS ---
        const Icons = {
            Zap: ({ className }) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M4 14.71 14.15 3l-2.06 8.57L20 9.29 9.85 21l2.06-8.57L4 14.71z"/></svg>,
            Activity: ({ className }) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg>,
            Thermometer: ({ className }) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M14 4v10.54a4 4 0 1 1-4 0V4a2 2 0 0 1 4 0Z"/></svg>,
            ShieldAlert: ({ className }) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M20 13c0 5-3.5 7.5-7.66 8.95a1 1 0 0 1-.67-.01C7.5 20.5 4 18 4 13V6a1 1 0 0 1 1-1c2 0 4.5-1.2 6.24-2.72a1.17 1.17 0 0 1 1.52 0C14.5 3.8 17 5 19 5a1 1 0 0 1 1 1z"/><path d="M12 8v4"/><path d="M12 16h.01"/></svg>,
            LogOut: ({ className }) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" x2="9" y1="12" y2="12"/></svg>,
            FileSpreadsheet: ({ className }) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect width="18" height="18" x="3" y="3" rx="2" ry="2"/><line x1="3" x2="21" y1="9" y2="9"/><line x1="3" x2="21" y1="15" y2="15"/><line x1="9" x2="9" y1="3" y2="21"/><line x1="15" x2="15" y1="3" y2="21"/></svg>,
            Lock: ({ className }) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect width="18" height="11" x="3" y="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
        };

        const App = () => {
            const [user, setUser] = useState(null);
            const [view, setView] = useState('login'); 
            const [loading, setLoading] = useState(true);
            const [formData, setFormData] = useState({ name: '', email: '', password: '' });
            const [activeOperator, setActiveOperator] = useState(null); // stores the credentials used to log in
            const [visitors, setVisitors] = useState([]);
            const [plantStats, setPlantStats] = useState({
                coreTemp: 285,
                pressure: 15.2,
                output: 940,
                radiation: 0.12,
                status: 'OPTIMAL'
            });

            useEffect(() => {
                const initAuth = async () => {
                    try {
                        if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                            await auth.signInWithCustomToken(__initial_auth_token);
                        }
                    } catch (err) {
                        console.error("Auth Init Error:", err);
                    } finally {
                        setLoading(false);
                    }
                };
                initAuth();

                const unsubscribe = auth.onAuthStateChanged((u) => {
                    setUser(u);
                    if (u) setView('dashboard');
                });
                return () => unsubscribe();
            }, []);

            useEffect(() => {
                if (!user) return;
                const visitorRef = db.collection('artifacts').doc(appId).collection('public').doc('data').collection('visitor_logs');
                const unsubscribe = visitorRef.onSnapshot((snapshot) => {
                    const logs = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                    setVisitors(logs);
                }, (err) => console.error("Firestore error:", err));
                return () => unsubscribe();
            }, [user]);

            useEffect(() => {
                if (view !== 'dashboard') return;
                const interval = setInterval(() => {
                    setPlantStats(prev => ({
                        ...prev,
                        coreTemp: +(prev.coreTemp + (Math.random() - 0.5) * 2).toFixed(1),
                        pressure: +(prev.pressure + (Math.random() - 0.5) * 0.1).toFixed(2),
                        output: +(prev.output + (Math.random() - 0.5) * 5).toFixed(0),
                        radiation: +(prev.radiation + (Math.random() - 0.5) * 0.01).toFixed(3)
                    }));
                }, 3000);
                return () => clearInterval(interval);
            }, [view]);

            const handleLogin = async (e) => {
                e.preventDefault();
                setLoading(true);
                try {
                    await auth.signInAnonymously();
                    setActiveOperator(formData);
                    await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('visitor_logs').add({
                        name: formData.name || 'Anonymous Operator',
                        email: formData.email,
                        accessTime: firebase.firestore.FieldValue.serverTimestamp(),
                        role: 'Authenticated User'
                    });
                } catch (err) {
                    console.error("Login Error:", err);
                } finally {
                    setLoading(false);
                }
            };

            const handleGuestLogin = async () => {
                setLoading(true);
                const guestData = { name: "Guest User", email: "guest@npcil.gov.in", password: "N/A" };
                try {
                    await auth.signInAnonymously();
                    setActiveOperator(guestData);
                    await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('visitor_logs').add({
                        name: "Guest User",
                        email: "guest@npcil.gov.in",
                        accessTime: firebase.firestore.FieldValue.serverTimestamp(),
                        role: 'Temporary Guest'
                    });
                } catch (err) {
                    console.error("Guest Auth Error:", err);
                } finally {
                    setLoading(false);
                }
            };

            const logout = () => {
                auth.signOut().then(() => {
                    setActiveOperator(null);
                    setView('login');
                });
            };

            const isAuthorizedForLogs = activeOperator && 
                                       activeOperator.name === "Devi" && 
                                       activeOperator.email === "deviz" && 
                                       activeOperator.password === "91";

            if (loading) return (
                <div className="h-screen w-full bg-black flex flex-col items-center justify-center gap-4">
                    <div className="w-12 h-12 border-4 border-emerald-500 border-t-transparent rounded-full animate-spin"></div>
                    <div className="text-emerald-500 font-nuclear animate-pulse tracking-[0.5em] text-xs">STABILIZING CORE...</div>
                </div>
            );

            return (
                <div className="min-h-screen w-full relative flex items-center justify-center p-4">
                    {/* Background Layer with requested Green Overlay */}
                    <div 
                        className="fixed inset-0 z-0 bg-cover bg-center"
                        style={{ backgroundImage: `url('https://images.unsplash.com/photo-1518770660439-4636190af475?auto=format&fit=crop&q=80')` }}
                    >
                        <div className="absolute inset-0 green-overlay backdrop-blur-[1px]"></div>
                        <div className="absolute inset-0 bg-gradient-to-b from-transparent via-emerald-950/40 to-black"></div>
                    </div>

                    {/* Main UI */}
                    <div className="relative z-10 w-full flex justify-center">
                        {view === 'login' && (
                            <div className="glass w-full max-w-md p-8 rounded-2xl nuclear-glow">
                                <div className="flex items-center gap-4 mb-8">
                                    {/* Logo Placeholder */}
                                    <div className="w-14 h-14 bg-emerald-500 rounded-full flex items-center justify-center shadow-[0_0_20px_rgba(16,185,129,0.5)] border-2 border-white/20">
                                        <Icons.Zap className="text-black" />
                                    </div>
                                    <h1 className="text-2xl font-nuclear font-bold tracking-tighter text-emerald-400">NPCIL <span className="text-white opacity-50 text-xs block font-sans">PARAMETER CONTROL</span></h1>
                                </div>
                                <form onSubmit={handleLogin} className="space-y-4">
                                    <input 
                                        type="text" placeholder="Operator Name" required
                                        className="w-full bg-black/40 border border-emerald-900/50 rounded-lg p-3 text-emerald-100 placeholder:text-emerald-800 focus:outline-none focus:border-emerald-500 transition-all"
                                        onChange={e => setFormData({...formData, name: e.target.value})}
                                    />
                                    <input 
                                        type="text" placeholder="Station Email" required
                                        className="w-full bg-black/40 border border-emerald-900/50 rounded-lg p-3 text-emerald-100 placeholder:text-emerald-800 focus:outline-none focus:border-emerald-500 transition-all"
                                        onChange={e => setFormData({...formData, email: e.target.value})}
                                    />
                                    <input 
                                        type="password" placeholder="Security PIN" required
                                        className="w-full bg-black/40 border border-emerald-900/50 rounded-lg p-3 text-emerald-100 placeholder:text-emerald-800 focus:outline-none focus:border-emerald-500 transition-all"
                                        onChange={e => setFormData({...formData, password: e.target.value})}
                                    />
                                    <button className="w-full bg-emerald-600 hover:bg-emerald-500 text-black font-bold py-3 rounded-lg shadow-lg transition-all uppercase text-xs tracking-widest font-nuclear">
                                        Authenticate Terminal
                                    </button>
                                    <button 
                                        type="button"
                                        onClick={handleGuestLogin}
                                        className="w-full border border-emerald-500/40 hover:bg-emerald-500/10 text-emerald-400 py-3 rounded-lg transition-all uppercase text-xs tracking-widest font-nuclear"
                                    >
                                        Authenticate As Guest
                                    </button>
                                </form>
                                <p className="text-center mt-6 text-[10px] text-white/30 uppercase tracking-[0.3em]">Secure Zone • Terminal Access Required</p>
                            </div>
                        )}

                        {view === 'dashboard' && (
                            <div className="w-full max-w-6xl space-y-6">
                                <header className="glass p-6 rounded-2xl flex flex-col md:flex-row justify-between items-center gap-4">
                                    <div className="flex items-center gap-4">
                                        <div className="w-12 h-12 bg-emerald-500/20 rounded-full border border-emerald-500/40 flex items-center justify-center">
                                            <Icons.Activity className="text-emerald-400" />
                                        </div>
                                        <div>
                                            <h2 className="text-xl font-nuclear font-bold text-white uppercase">Control Center 01</h2>
                                            <p className="text-emerald-500/60 text-[10px] font-mono tracking-widest">USER: {activeOperator?.name} • ROLE: {activeOperator?.name === 'Guest User' ? 'GUEST' : 'ADMIN'}</p>
                                        </div>
                                    </div>
                                    <div className="flex gap-2">
                                        {isAuthorizedForLogs && (
                                            <button onClick={() => setView('visitorLog')} className="flex items-center gap-2 px-4 py-2 bg-blue-500/10 border border-blue-500/30 text-blue-400 rounded-lg text-xs font-bold hover:bg-blue-500/20 transition-all">
                                                <Icons.FileSpreadsheet /> VISITOR LOG
                                            </button>
                                        )}
                                        <button onClick={logout} className="flex items-center gap-2 px-4 py-2 bg-red-500/10 border border-red-500/30 text-red-400 rounded-lg text-xs font-bold hover:bg-red-500/20 transition-all">
                                            <Icons.LogOut /> DISCONNECT
                                        </button>
                                    </div>
                                </header>

                                <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4">
                                    <StatCard label="Core Temperature" val={plantStats.coreTemp} unit="°C" color="text-orange-400" icon={<Icons.Thermometer className="w-5 h-5"/>} />
                                    <StatCard label="Pressure Levels" val={plantStats.pressure} unit="MPa" color="text-blue-400" icon={<Icons.Zap className="w-5 h-5"/>} />
                                    <StatCard label="Turbine Output" val={plantStats.output} unit="MWe" color="text-emerald-400" icon={<Icons.Activity className="w-5 h-5"/>} />
                                    <StatCard label="Ambient Radiation" val={plantStats.radiation} unit="mSv" color="text-yellow-400" icon={<Icons.ShieldAlert className="w-5 h-5"/>} />
                                </div>

                                <div className="glass p-6 rounded-2xl">
                                    <h3 className="text-emerald-500 font-nuclear text-xs mb-4 uppercase tracking-[0.2em] flex items-center gap-2">
                                        <span className="w-2 h-2 rounded-full bg-emerald-500 animate-pulse"></span>
                                        Real-Time Frequency Monitor
                                    </h3>
                                    <div className="h-48 flex items-end gap-1 overflow-hidden">
                                        {Array.from({length: 60}).map((_, i) => (
                                            <div key={i} className="flex-1 bg-emerald-500/20 rounded-t border-t border-emerald-500/40 transition-all duration-1000" style={{ height: `${15 + Math.random()*85}%` }}></div>
                                        ))}
                                    </div>
                                </div>
                            </div>
                        )}

                        {view === 'visitorLog' && (
                            <div className="glass w-full max-w-4xl p-8 rounded-2xl overflow-hidden shadow-2xl">
                                <div className="flex justify-between items-center mb-8">
                                    <h2 className="text-xl font-nuclear text-blue-400 uppercase tracking-widest">Access Ledger (Historical)</h2>
                                    <button onClick={() => setView('dashboard')} className="text-xs opacity-50 hover:opacity-100 uppercase underline">Back to Console</button>
                                </div>
                                <div className="overflow-x-auto">
                                    <table className="w-full text-left text-[11px] font-mono uppercase tracking-tight">
                                        <thead className="border-b border-white/10 text-emerald-500">
                                            <tr>
                                                <th className="pb-4 px-2 font-bold">Operator ID</th>
                                                <th className="pb-4 px-2 font-bold">Channel</th>
                                                <th className="pb-4 px-2 font-bold text-center">Designation</th>
                                                <th className="pb-4 px-2 font-bold text-right">Timestamp</th>
                                            </tr>
                                        </thead>
                                        <tbody className="text-white/70">
                                            {visitors.map(log => (
                                                <tr key={log.id} className="border-b border-white/5 hover:bg-white/5 transition-colors">
                                                    <td className="py-4 px-2 font-bold text-white">{log.name}</td>
                                                    <td className="py-4 px-2 opacity-60">{log.email}</td>
                                                    <td className="py-4 px-2 text-center">
                                                        <span className={`px-2 py-0.5 rounded ${log.role === 'Temporary Guest' ? 'bg-yellow-500/20 text-yellow-500' : 'bg-emerald-500/20 text-emerald-500'}`}>
                                                            {log.role}
                                                        </span>
                                                    </td>
                                                    <td className="py-4 px-2 text-right opacity-40 font-sans">
                                                        {log.accessTime ? log.accessTime.toDate().toLocaleString() : 'PENDING'}
                                                    </td>
                                                </tr>
                                            ))}
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        )}
                    </div>

                    {/* UI Deco / Watermark */}
                    <div className="fixed top-4 left-4 text-[10px] text-emerald-500/20 font-mono pointer-events-none uppercase tracking-[0.3em] font-nuclear">NPCIL-SECURE-TERM-99</div>
                    <div className="fixed bottom-4 right-4 text-[10px] text-emerald-500/20 font-mono pointer-events-none uppercase tracking-[0.3em] font-nuclear animate-pulse-slow">CORE STATUS: SYNCHRONIZED</div>
                </div>
            );
        };

        const StatCard = ({ label, val, unit, color, icon }) => (
            <div className="glass p-5 rounded-2xl hover:border-emerald-500/60 group transition-all duration-300">
                <div className="flex justify-between items-start mb-4">
                    <div className={`${color} group-hover:scale-110 transition-transform`}>{icon}</div>
                    <div className="text-[8px] opacity-20 font-nuclear tracking-widest uppercase">Live-X</div>
                </div>
                <div className="text-2xl font-nuclear font-bold tracking-tight">
                    {val} <span className="text-[10px] font-sans opacity-50 uppercase">{unit}</span>
                </div>
                <div className="text-[10px] opacity-40 uppercase tracking-widest mt-1 font-medium">{label}</div>
            </div>
        );

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
