<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nuclear Parameter Update System</title>
  <script src="https://kit.fontawesome.com/740cc49fd4.js" crossorigin="anonymous"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">

  <style>
    :root {
      --primary-color: #00a651;
      --primary-dark: #008040;
      --secondary-color: #0066cc;
      --accent-green: #2ecc71;
      --text-dark: #1a1a2e;
      --text-light: #ffffff;
      --overlay-green: rgba(0, 166, 81, 0.15);
      /* Updated to a light greenish tint */
      --glass-bg: rgba(242, 252, 246, 0.97);
      --shadow-soft: 0 10px 40px rgba(0, 0, 0, 0.1);
      --shadow-strong: 0 20px 60px rgba(0, 0, 0, 0.2);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Outfit', sans-serif;
      overflow-x: hidden;
    }

    /* Container with background and green overlay */
    .container {
      width: 100%;
      min-height: 100vh;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    /* Background image layer */
    .background-layer {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-image: url(bg_img.jpg);
      background-position: center;
      background-size: cover;
      background-attachment: fixed;
      z-index: 1;
    }

    /* Dark overlay */
    .dark-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 50, 0.75);
      z-index: 2;
    }

    /* Light greenish overlay */
    .green-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: var(--overlay-green);
      z-index: 3;
      backdrop-filter: blur(2px);
    }

    /* Animated particles background */
    .particles {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 4;
      overflow: hidden;
      pointer-events: none;
    }

    .particle {
      position: absolute;
      width: 4px;
      height: 4px;
      background: var(--accent-green);
      border-radius: 50%;
      opacity: 0.3;
      animation: float 15s infinite ease-in-out;
    }

    @keyframes float {
      0%, 100% {
        transform: translateY(0) translateX(0);
      }
      25% {
        transform: translateY(-100px) translateX(50px);
      }
      50% {
        transform: translateY(-200px) translateX(-30px);
      }
      75% {
        transform: translateY(-100px) translateX(-80px);
      }
    }

    /* Form box with light greenish texture */
    .form-box {
      width: 100%;
      max-width: 500px;
      position: relative;
      z-index: 10;
      background: var(--glass-bg);
      /* Subtle texture added here */
      background-image: radial-gradient(rgba(0, 166, 81, 0.03) 1px, transparent 1px);
      background-size: 20px 20px;
      padding: 50px 45px 60px;
      border-radius: 24px;
      box-shadow: var(--shadow-strong);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(0, 166, 81, 0.2);
      animation: slideUp 0.6s ease-out;
    }

    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* Header with logo and title */
    .header-container {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 20px;
      margin-bottom: 50px;
      flex-wrap: wrap;
    }

    .logo-container {
      width: 70px;
      height: 70px;
      background: linear-gradient(135deg, var(--primary-color), var(--accent-green));
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 8px 20px rgba(0, 166, 81, 0.3);
      animation: pulse 2s infinite ease-in-out;
    }

    @keyframes pulse {
      0%, 100% {
        transform: scale(1);
        box-shadow: 0 8px 20px rgba(0, 166, 81, 0.3);
      }
      50% {
        transform: scale(1.05);
        box-shadow: 0 12px 30px rgba(0, 166, 81, 0.5);
      }
    }

    .logo-container i {
      font-size: 36px;
      color: var(--text-light);
    }

    .logo-placeholder {
      width: 60px;
      height: 60px;
      background: url('logo.png') center/contain no-repeat;
    }

    .title-container {
      text-align: center;
    }

    .title-container h1 {
      font-family: 'Rajdhani', sans-serif;
      font-size: 28px;
      font-weight: 700;
      color: var(--text-dark);
      line-height: 1.2;
      letter-spacing: 0.5px;
      margin: 0;
    }

    .title-container .subtitle {
      font-size: 13px;
      color: #666;
      font-weight: 400;
      margin-top: 5px;
      letter-spacing: 1px;
    }

    /* Input fields */
    .input-group {
      margin-bottom: 30px;
    }

    .input-field {
      position: relative;
      margin-bottom: 20px;
      transition: all 0.3s ease;
    }

    .input-field i {
      position: absolute;
      left: 20px;
      top: 50%;
      transform: translateY(-50%);
      color: #999;
      font-size: 18px;
      transition: all 0.3s ease;
      z-index: 1;
    }

    .input-field input {
      width: 100%;
      padding: 16px 20px 16px 55px;
      border: 2px solid #e8e8e8;
      border-radius: 12px;
      font-size: 15px;
      font-family: 'Outfit', sans-serif;
      transition: all 0.3s ease;
      background: rgba(255, 255, 255, 0.6);
      color: var(--text-dark);
    }

    .input-field input:focus {
      outline: none;
      border-color: var(--primary-color);
      background: white;
      box-shadow: 0 4px 12px rgba(0, 166, 81, 0.1);
    }

    .input-field input:focus + i,
    .input-field:hover i {
      color: var(--primary-color);
    }

    .input-field input::placeholder {
      color: #aaa;
    }

    .input-field.hide-field {
      max-height: 0;
      opacity: 0;
      margin-bottom: 0;
      overflow: hidden;
    }

    .input-field.show-field {
      max-height: 80px;
      opacity: 1;
    }

    .forgot-link {
      text-align: right;
      margin-top: -10px;
      margin-bottom: 25px;
    }

    .forgot-link a {
      color: var(--secondary-color);
      text-decoration: none;
      font-size: 14px;
      transition: all 0.3s ease;
    }

    .forgot-link a:hover {
      color: var(--primary-color);
      text-decoration: underline;
    }

    .btn-field {
      display: flex;
      gap: 12px;
      margin-bottom: 20px;
    }

    .btn-field button {
      flex: 1;
      padding: 14px 24px;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 600;
      font-family: 'Rajdhani', sans-serif;
      cursor: pointer;
      transition: all 0.3s ease;
      letter-spacing: 0.5px;
      position: relative;
      overflow: hidden;
    }

    .btn-field button::before {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      width: 0;
      height: 0;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.3);
      transform: translate(-50%, -50%);
      transition: width 0.6s, height 0.6s;
    }

    .btn-field button:hover::before {
      width: 300px;
      height: 300px;
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--primary-color), var(--accent-green));
      color: var(--text-light);
      box-shadow: 0 6px 20px rgba(0, 166, 81, 0.3);
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 25px rgba(0, 166, 81, 0.4);
    }

    .btn-secondary {
      background: rgba(255, 255, 255, 0.8);
      color: var(--text-dark);
      border: 2px solid #e8e8e8;
    }

    .btn-secondary:hover {
      border-color: var(--primary-color);
      color: var(--primary-color);
      transform: translateY(-2px);
    }

    /* Guest access section */
    .guest-section {
      margin-top: 30px;
      padding-top: 30px;
      border-top: 1px solid rgba(0, 166, 81, 0.1);
    }

    .guest-title {
      text-align: center;
      color: #666;
      font-size: 13px;
      margin-bottom: 15px;
      font-weight: 500;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    .guest-btn {
      width: 100%;
      padding: 14px 24px;
      background: linear-gradient(135deg, #2ecc71, #27ae60);
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 600;
      font-family: 'Rajdhani', sans-serif;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 6px 20px rgba(46, 204, 113, 0.3);
      letter-spacing: 0.5px;
      margin-bottom: 12px;
    }

    .guest-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 25px rgba(46, 204, 113, 0.4);
    }

    .visitor-log-btn {
      width: 100%;
      padding: 12px 20px;
      background: rgba(255, 255, 255, 0.8);
      color: var(--secondary-color);
      border: 2px solid var(--secondary-color);
      border-radius: 12px;
      font-size: 14px;
      font-weight: 600;
      font-family: 'Rajdhani', sans-serif;
      cursor: pointer;
      transition: all 0.3s ease;
      letter-spacing: 0.5px;
    }

    .visitor-log-btn:hover {
      background: var(--secondary-color);
      color: white;
      transform: translateY(-2px);
    }

    /* Modal styles with light greenish texture */
    .modal {
      display: none;
      position: fixed;
      z-index: 1000;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.7);
      backdrop-filter: blur(5px);
      animation: fadeIn 0.3s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    .modal-content {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: var(--glass-bg);
      /* Subtle texture added to modals too */
      background-image: radial-gradient(rgba(0, 166, 81, 0.03) 1px, transparent 1px);
      background-size: 20px 20px;
      padding: 40px;
      border-radius: 20px;
      max-width: 450px;
      width: 90%;
      box-shadow: var(--shadow-strong);
      border: 1px solid rgba(0, 166, 81, 0.2);
      animation: slideUp 0.4s ease;
    }

    .modal-header {
      text-align: center;
      margin-bottom: 30px;
    }

    .modal-header h2 {
      font-family: 'Rajdhani', sans-serif;
      font-size: 24px;
      color: var(--text-dark);
      margin-bottom: 10px;
    }

    .modal-header p {
      color: #666;
      font-size: 14px;
    }

    .close-modal {
      position: absolute;
      top: 15px;
      right: 20px;
      font-size: 28px;
      color: #999;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .close-modal:hover {
      color: var(--text-dark);
      transform: rotate(90deg);
    }

    .modal-input {
      width: 100%;
      padding: 14px 20px;
      border: 2px solid #e8e8e8;
      border-radius: 12px;
      font-size: 16px;
      font-family: 'Outfit', sans-serif;
      margin-bottom: 20px;
      transition: all 0.3s ease;
      background: white;
    }

    .modal-input:focus {
      outline: none;
      border-color: var(--primary-color);
      box-shadow: 0 4px 12px rgba(0, 166, 81, 0.1);
    }

    .modal-btn {
      width: 100%;
      padding: 14px 24px;
      background: linear-gradient(135deg, var(--primary-color), var(--accent-green));
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 600;
      font-family: 'Rajdhani', sans-serif;
      cursor: pointer;
      transition: all 0.3s ease;
      letter-spacing: 0.5px;
    }

    .modal-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 25px rgba(0, 166, 81, 0.4);
    }

    /* Visitor log table */
    .visitor-table {
      width: 100%;
      margin-top: 20px;
      border-collapse: collapse;
      max-height: 300px;
      overflow-y: auto;
      display: block;
    }

    .visitor-table thead {
      background: var(--primary-color);
      color: white;
    }

    .visitor-table th {
      padding: 12px;
      text-align: left;
      font-family: 'Rajdhani', sans-serif;
      font-weight: 600;
      letter-spacing: 0.5px;
    }

    .visitor-table td {
      padding: 10px 12px;
      border-bottom: 1px solid #e8e8e8;
      font-size: 14px;
    }

    .visitor-table tbody tr:hover {
      background: rgba(0, 166, 81, 0.05);
    }

    .no-data {
      text-align: center;
      padding: 30px;
      color: #999;
      font-style: italic;
    }

    /* Success/Error message */
    .success-msg {
      background: #d4edda;
      color: #155724;
      padding: 12px 20px;
      border-radius: 8px;
      margin-bottom: 20px;
      border-left: 4px solid #28a745;
      display: none;
      animation: slideDown 0.3s ease;
    }

    .error-msg {
      background: #f8d7da;
      color: #721c24;
      padding: 12px 20px;
      border-radius: 8px;
      margin-bottom: 20px;
      border-left: 4px solid #dc3545;
      display: none;
      animation: slideDown 0.3s ease;
    }

    /* Responsive design */
    @media (max-width: 600px) {
      .form-box {
        padding: 40px 30px 50px;
      }
      .title-container h1 {
        font-size: 22px;
      }
      .btn-field {
        flex-direction: column;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="background-layer"></div>
    <div class="dark-overlay"></div>
    <div class="green-overlay"></div>
    <div class="particles" id="particles"></div>

    <div class="form-box">
      <div class="header-container">
        <div class="logo-container">
          <i class="fas fa-atom"></i>
        </div>
        <div class="title-container">
          <h1>Nuclear Parameter Update System</h1>
          <div class="subtitle">NPCIL</div>
        </div>
      </div>

      <div class="success-msg" id="successMsg"></div>
      <div class="error-msg" id="errorMsg"></div>

      <form id="authForm">
        <div class="input-group">
          <div class="input-field hide-field" id="nameField">
            <input type="text" id="nameInput" placeholder="Full Name">
            <i class="fa-regular fa-user"></i>
          </div>

          <div class="input-field">
            <input type="email" id="emailInput" placeholder="Email Address" required>
            <i class="fa-regular fa-envelope"></i>
          </div>

          <div class="input-field">
            <input type="password" id="passwordInput" placeholder="Password" required>
            <i class="fa-solid fa-lock"></i>
          </div>
        </div>

        <div class="forgot-link">
          <a href="help.html">Forgot password?</a>
        </div>

        <div class="btn-field">
          <button type="button" class="btn-primary" id="signInBtn">
            <i class="fas fa-sign-in-alt"></i> Sign In
          </button>
          <button type="button" class="btn-secondary" id="signUpBtn">
            <i class="fas fa-user-plus"></i> Sign Up
          </button>
        </div>
      </form>

      <div class="guest-section">
        <div class="guest-title">Temporary Access</div>
        <button class="guest-btn" id="guestBtn">
          <i class="fas fa-user-clock"></i> Authenticate as Guest
        </button>
        <button class="visitor-log-btn" id="visitorLogBtn">
          <i class="fas fa-clipboard-list"></i> View Visitor Log
        </button>
      </div>
    </div>
  </div>

  <div id="guestModal" class="modal">
    <div class="modal-content">
      <span class="close-modal" id="closeGuestModal">&times;</span>
      <div class="modal-header">
        <h2>Guest Access</h2>
        <p>Enter your email to access the dashboard as a guest</p>
      </div>
      <input type="email" class="modal-input" id="guestEmail" placeholder="Enter your email address" required>
      <button class="modal-btn" id="guestSubmitBtn">
        <i class="fas fa-arrow-right"></i> Access Dashboard
      </button>
    </div>
  </div>

  <div id="passwordModal" class="modal">
    <div class="modal-content">
      <span class="close-modal" id="closePasswordModal">&times;</span>
      <div class="modal-header">
        <h2>Protected Access</h2>
        <p>Enter password to view visitor log</p>
      </div>
      <input type="password" class="modal-input" id="visitorPassword" placeholder="Enter password">
      <button class="modal-btn" id="passwordSubmitBtn">
        <i class="fas fa-unlock"></i> Unlock
      </button>
    </div>
  </div>

  <div id="visitorLogModal" class="modal">
    <div class="modal-content" style="max-width: 600px;">
      <span class="close-modal" id="closeVisitorLogModal">&times;</span>
      <div class="modal-header">
        <h2>Visitor Log</h2>
        <p>Guest access history</p>
      </div>
      <div style="overflow-x: auto;">
        <table class="visitor-table">
          <thead>
            <tr>
              <th>#</th>
              <th>Email</th>
              <th>Date & Time</th>
            </tr>
          </thead>
          <tbody id="visitorTableBody">
            <tr>
              <td colspan="3" class="no-data">No visitor records found</td>
            </tr>
          </tbody>
        </table>
      </div>
      <button class="modal-btn" id="clearLogBtn" style="margin-top: 20px; background: linear-gradient(135deg, #e74c3c, #c0392b);">
        <i class="fas fa-trash-alt"></i> Clear All Records
      </button>
    </div>
  </div>

  <script>
    function createParticles() {
      const particlesContainer = document.getElementById('particles');
      const particleCount = 20;
      for (let i = 0; i < particleCount; i++) {
        const particle = document.createElement('div');
        particle.className = 'particle';
        particle.style.left = Math.random() * 100 + '%';
        particle.style.top = Math.random() * 100 + '%';
        particle.style.animationDelay = Math.random() * 15 + 's';
        particle.style.animationDuration = (15 + Math.random() * 10) + 's';
        particlesContainer.appendChild(particle);
      }
    }
    createParticles();

    const nameField = document.getElementById('nameField');
    const nameInput = document.getElementById('nameInput');
    const emailInput = document.getElementById('emailInput');
    const passwordInput = document.getElementById('passwordInput');
    const signInBtn = document.getElementById('signInBtn');
    const signUpBtn = document.getElementById('signUpBtn');
    const authForm = document.getElementById('authForm');
    const successMsg = document.getElementById('successMsg');
    const errorMsg = document.getElementById('errorMsg');
    const guestBtn = document.getElementById('guestBtn');
    const guestModal = document.getElementById('guestModal');
    const closeGuestModal = document.getElementById('closeGuestModal');
    const guestEmail = document.getElementById('guestEmail');
    const guestSubmitBtn = document.getElementById('guestSubmitBtn');
    const visitorLogBtn = document.getElementById('visitorLogBtn');
    const passwordModal = document.getElementById('passwordModal');
    const closePasswordModal = document.getElementById('closePasswordModal');
    const visitorPassword = document.getElementById('visitorPassword');
    const passwordSubmitBtn = document.getElementById('passwordSubmitBtn');
    const visitorLogModal = document.getElementById('visitorLogModal');
    const closeVisitorLogModal = document.getElementById('closeVisitorLogModal');
    const visitorTableBody = document.getElementById('visitorTableBody');
    const clearLogBtn = document.getElementById('clearLogBtn');

    let isSignUpMode = false;

    function showMessage(message, isError = false) {
      if (isError) {
        errorMsg.textContent = message;
        errorMsg.style.display = 'block';
        successMsg.style.display = 'none';
      } else {
        successMsg.textContent = message;
        successMsg.style.display = 'block';
        errorMsg.style.display = 'none';
      }
      setTimeout(() => {
        successMsg.style.display = 'none';
        errorMsg.style.display = 'none';
      }, 4000);
    }

    signUpBtn.addEventListener('click', function() {
      isSignUpMode = true;
      nameField.classList.remove('hide-field');
      nameField.classList.add('show-field');
      nameInput.required = true;
      signUpBtn.classList.add('btn-primary');
      signUpBtn.classList.remove('btn-secondary');
      signInBtn.classList.add('btn-secondary');
      signInBtn.classList.remove('btn-primary');
    });

    signInBtn.addEventListener('click', function() {
      if (!isSignUpMode) {
        if (emailInput.value && passwordInput.value) {
          window.location.href = 'bgpage.html';
        } else {
          showMessage('Please fill in all required fields', true);
        }
      } else {
        isSignUpMode = false;
        nameField.classList.remove('show-field');
        nameField.classList.add('hide-field');
        nameInput.required = false;
        signInBtn.classList.add('btn-primary');
        signInBtn.classList.remove('btn-secondary');
        signUpBtn.classList.add('btn-secondary');
        signUpBtn.classList.remove('btn-primary');
      }
    });

    authForm.addEventListener('submit', function(e) {
      e.preventDefault();
      if (isSignUpMode && nameInput.value && emailInput.value && passwordInput.value) {
        window.location.href = 'account.html';
      }
    });

    guestBtn.addEventListener('click', function() {
      guestModal.style.display = 'block';
      guestEmail.value = '';
    });

    closeGuestModal.addEventListener('click', function() {
      guestModal.style.display = 'none';
    });

    guestSubmitBtn.addEventListener('click', function() {
      const email = guestEmail.value.trim();
      if (!email) {
        showMessage('Please enter your email address', true);
        return;
      }
      const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
      if (!emailRegex.test(email)) {
        showMessage('Please enter a valid email address', true);
        return;
      }
      storeGuestEmail(email);
      window.location.href = 'bgpage.html';
    });

    function storeGuestEmail(email) {
      let guestLog = JSON.parse(localStorage.getItem('guestVisitors') || '[]');
      const visitor = {
        email: email,
        timestamp: new Date().toISOString(),
        dateFormatted: new Date().toLocaleString('en-IN', {
          day: '2-digit', month: 'short', year: 'numeric',
          hour: '2-digit', minute: '2-digit', hour12: true
        })
      };
      guestLog.push(visitor);
      localStorage.setItem('guestVisitors', JSON.stringify(guestLog));
    }

    visitorLogBtn.addEventListener('click', function() {
      passwordModal.style.display = 'block';
      visitorPassword.value = '';
    });

    closePasswordModal.addEventListener('click', function() {
      passwordModal.style.display = 'none';
    });

    passwordSubmitBtn.addEventListener('click', function() {
      const password = visitorPassword.value;
      if (password === '91') {
        passwordModal.style.display = 'none';
        displayVisitorLog();
      } else {
        showMessage('Incorrect password', true);
        visitorPassword.value = '';
      }
    });

    function displayVisitorLog() {
      const guestLog = JSON.parse(localStorage.getItem('guestVisitors') || '[]');
      if (guestLog.length === 0) {
        visitorTableBody.innerHTML = '<tr><td colspan="3" class="no-data">No visitor records found</td></tr>';
      } else {
        visitorTableBody.innerHTML = guestLog.map((visitor, index) => `
          <tr>
            <td>${index + 1}</td>
            <td>${visitor.email}</td>
            <td>${visitor.dateFormatted}</td>
          </tr>
        `).join('');
      }
      visitorLogModal.style.display = 'block';
    }

    closeVisitorLogModal.addEventListener('click', function() {
      visitorLogModal.style.display = 'none';
    });

    clearLogBtn.addEventListener('click', function() {
      if (confirm('Are you sure you want to clear all visitor records?')) {
        localStorage.removeItem('guestVisitors');
        visitorTableBody.innerHTML = '<tr><td colspan="3" class="no-data">No visitor records found</td></tr>';
        showMessage('Visitor log cleared successfully');
      }
    });

    window.addEventListener('click', function(event) {
      if (event.target === guestModal) guestModal.style.display = 'none';
      if (event.target === passwordModal) passwordModal.style.display = 'none';
      if (event.target === visitorLogModal) visitorLogModal.style.display = 'none';
    });

    authForm.addEventListener('keypress', function(e) {
      if (e.key === 'Enter') {
        e.preventDefault();
        if (isSignUpMode) {
          if (nameInput.value && emailInput.value && passwordInput.value) window.location.href = 'account.html';
        } else {
          if (emailInput.value && passwordInput.value) window.location.href = 'bgpage.html';
        }
      }
    });
  </script>
</body>
</html>
